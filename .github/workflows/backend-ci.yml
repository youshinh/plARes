name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

jobs:
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check (py_compile)
        run: |
          python -m py_compile ai_core/main.py
          python -m py_compile ai_core/streaming/bidi_session.py
          python -m py_compile ai_core/agents/articulation_agent.py
          python -m py_compile ai_core/character_generator.py
          python -m py_compile infrastructure/multimodal_pipeline.py
          python -m py_compile infrastructure/vertex_cache.py
          python -m py_compile infrastructure/mcp_server.py

      - name: Run tests
        run: |
          PYTHONPATH=. python -m pytest tests -q --timeout=10
        env:
          PLARES_FIRESTORE_MODE: "off"
